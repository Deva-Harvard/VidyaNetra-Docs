<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VidyaNetra — Start a Pilot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 52px 24px;
  }

  .card {
    max-width: 560px;
    width: 100%;
    background: #fff8f4;
    border: 1.5px solid #f7d5c2;
    border-radius: 20px;
    padding: 40px 36px 32px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #c4704a;
    margin-bottom: 4px;
  }

  .heading {
    font-size: 26px;
    font-weight: 900;
    color: #111827;
    line-height: 1.25;
    margin-bottom: 4px;
  }

  .subtext {
    font-size: 14px;
    color: #6b7280;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .divider {
    height: 1.5px;
    background: #f7d5c2;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  iframe {
    width: 100%;
    height: 620px;
    border: none;
    border-radius: 8px;
  }

  .footer-note {
    font-size: 12px;
    color: #9ca3af;
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="tag">Get Started</div>
    <div class="heading">Start a Pilot at Your School</div>
    <p class="subtext">Interested in bringing VidyaNetra to your school? Fill in your details and we'll reach out within 24 hours.</p>
    <div class="divider"></div>
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeRNAtM2OuuFg0wA0kI-RRxgEKVo7DEpnFv6tgOmuvPs3S9kQ/viewform?embedded=true" loading="lazy">Loading…</iframe>
    <div class="footer-note">Your information is only used to get in touch with you about VidyaNetra.</div>
  </div>
</body>
</html>
