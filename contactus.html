<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VidyaNetra — Start a Pilot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 52px 24px;
  }

  .card {
    max-width: 480px;
    width: 100%;
    background: #fff8f4;
    border: 1.5px solid #f7d5c2;
    border-radius: 20px;
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #c4704a;
    margin-bottom: 10px;
  }

  .heading {
    font-size: 24px;
    font-weight: 900;
    color: #111827;
    line-height: 1.25;
    margin-bottom: 8px;
  }

  .subtext {
    font-size: 13.5px;
    color: #6b7280;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .divider {
    height: 1.5px;
    background: #f7d5c2;
    border-radius: 2px;
    margin-bottom: 28px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 18px;
  }

  .req { color: #e11d48; font-weight: 700; }

  label {
    font-size: 12px;
    font-weight: 700;
    color: #374151;
    letter-spacing: 0.3px;
  }

  input, textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: #111827;
    background: #ffffff;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, textarea:focus {
    border-color: #f9a8c0;
  }

  textarea {
    resize: none;
    height: 90px;
  }

  button {
    margin-top: 10px;
    width: 100%;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.15s;
  }

  button:hover { background: #1f2937; }

  .footer-note {
    font-size: 11.5px;
    color: #9ca3af;
    text-align: center;
    margin-top: 16px;
  }

  .success {
    display: none;
    text-align: center;
    padding: 32px 0 16px;
    font-size: 15px;
    color: #166534;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="tag">Get Started</div>
    <div class="heading">Start a Pilot at Your School</div>
    <p class="subtext">Interested in bringing VidyaNetra to your school? Fill in your details and we'll reach out within 24 hours.</p>
    <div class="divider"></div>

    <form id="pilot-form" action="https://formspree.io/f/mojzobok" method="POST">
      <div class="field">
        <label for="name">Your Name <span class="req">*</span></label>
        <input type="text" id="name" name="name" placeholder="e.g. Priya Sharma" required>
      </div>
      <div class="field">
        <label for="school">School Name <span class="req">*</span></label>
        <input type="text" id="school" name="school" placeholder="e.g. St. Mary's School, Chennai" required>
      </div>
      <div class="field">
        <label for="city">City <span class="req">*</span></label>
        <input type="text" id="city" name="city" placeholder="e.g. Chennai" required>
      </div>
      <div class="field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="e.g. 98765 43210">
      </div>
      <div class="field">
        <label for="email">Email Address <span class="req">*</span></label>
        <input type="email" id="email" name="email" placeholder="e.g. principal@school.edu" required>
      </div>
      <div class="field">
        <label for="message">Anything else? <span style="font-weight:400;color:#9ca3af">(optional)</span></label>
        <textarea id="message" name="message" placeholder="e.g. We have 300 students across Classes 9 and 10…"></textarea>
      </div>
      <button type="submit">Contact Us →</button>
    </form>

    <div class="success" id="success-msg">Thank you! We'll reach out within 24 hours.</div>
    <p class="footer-note">Your information is only used to get in touch with you about VidyaNetra.</p>
  </div>

  <script>
    const form = document.getElementById('pilot-form');
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        form.style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
